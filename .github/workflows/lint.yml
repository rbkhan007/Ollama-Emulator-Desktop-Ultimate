name: Code Lint & Format

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python linters
        run: pip install ruff

      - name: Lint Python (Ruff)
        run: ruff check .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JS dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint JS/TS (Next.js ESLint)
        run: |
          cd frontend
          npm run lint
