name: Test Backend

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ollamaemu
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ollamaemu
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Start backend in background
        run: |
          python -m backend.src.ollama_emu.main &
          sleep 5
        env:
          DATABASE_URL: postgresql://ollamaemu:password@localhost:5432/ollamaemu
      - name: Run tests
        run: |
          cd backend/tests
          python test_api.py --online
        env:
          OLLAMA_EMU_TEST_BASE: http://localhost:11435
          DATABASE_URL: postgresql://ollamaemu:password@localhost:5432/ollamaemu
