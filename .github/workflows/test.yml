name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check compile
        run: |
          python -m py_compile backend/src/ollama_emu/main.py
          python -m py_compile backend/src/ollama_emu/db.py
          python -m py_compile backend/src/ollama_emu/acl.py
          python -m py_compile backend/src/ollama_emu/rag.py
          python -m py_compile backend/src/ollama_emu/memory.py
          python -m py_compile backend/tests/test_api.py
          python -m py_compile desktop/src/launcher.py
          python -m py_compile desktop/src/qml_engine.py
          python -m py_compile desktop/src/api_client.py

  test-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: ollamaemu
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ollamaemu
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run tests
        env:
          PGHOST: localhost
          PGUSER: ollamaemu
          PGPASSWORD: postgres
          PGDATABASE: ollamaemu
        run: |
          cd backend/tests
          python test_api.py --online

  lint-qml:
    name: Lint QML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check QML files syntax (basic)
        run: |
          # Check all .qml files have valid XML structure
          for f in $(find desktop/src/qml -name '*.qml'); do
            echo "Checking $f"
            python -c "
import xml.etree.ElementTree as ET
with open('$f', 'r') as fh:
    content = fh.read()
try:
    ET.fromstring(content)
except ET.ParseError as e:
    print(f'Parse error in $f: {e}')
    exit(1)
print('  OK')
"
          done
