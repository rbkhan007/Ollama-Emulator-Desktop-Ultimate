version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ollamaemu
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ollamaemu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./configs/setup_database.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollamaemu"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "11434:11434"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ollamaemu
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ollamaemu
      OLLAMA_EMU_BIND: 0.0.0.0
      OLLAMA_EMU_PORT: 11434
      OLLAMA_EMU_PROVIDER: ${OLLAMA_EMU_PROVIDER:-openrouter}
      OLLAMA_EMU_API_KEY: ${OLLAMA_EMU_API_KEY:-}
      OLLAMA_EMU_EMBEDDING_BACKEND: tfidf
      OLLAMA_EMU_DISABLE_RATE_LIMIT: "1"
      SSLCOMMERZ_STORE_ID: ${SSLCOMMERZ_STORE_ID:-}
      SSLCOMMERZ_STORE_PASSWORD: ${SSLCOMMERZ_STORE_PASSWORD:-}
      SMTP_SENDER: ${SMTP_SENDER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      APP_URL: ${APP_URL:-http://localhost:11434}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Cloudflare Tunnel – exposes backend to the internet without opening ports
  # Only used in production. For local dev, comment this service out.
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    # Alternative (if using credentials file instead of token):
    # command: tunnel --config /etc/cloudflared/config.yml run
    # volumes:
    #   - ./cloudflare/credentials:/home/nonroot/.cloudflared:ro
    #   - ./cloudflare/config.yml:/etc/cloudflared/config.yml:ro
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
      TUNNEL_URL: http://backend:11434
      TUNNEL_METRICS: 0.0.0.0:2000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
